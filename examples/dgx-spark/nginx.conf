events {}

http {
    server {
        listen 37000;

        location = /v1/chat/completions {
            if ($http_authorization != "Bearer ${LLM_API_KEY}") {
                add_header WWW-Authenticate "Bearer realm=\"llama.cpp\"";
                return 401;
            }

            proxy_pass http://llm:37000;
        }

        location / {
            allow 127.0.0.1;
            allow ::1;
            deny all;

            proxy_pass http://llm:37000;
        }
    }
}
