services:
  llm:
    image: j3soon/llama.cpp:server-cuda-spark
    container_name: local-llm-llama-cpp
    restart: unless-stopped
    gpus: all
    command: >-
      -hf ggml-org/gpt-oss-120b-GGUF
      --port 37000
      --ctx-size 0
      --jinja
      -ub 2048
      -b 2048
    expose:
      - "37000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:37000"]
    volumes:
      - ../../models:/root/.cache/llama.cpp

  nginx:
    image: nginx:1.29
    container_name: local-llm-nginx
    restart: unless-stopped
    depends_on:
      - llm
    ports:
      - "37000:37000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

# `llm` stays private on the Compose network.
# `nginx` is the only public entrypoint.
# Edit this file directly if you want a different model, host port, or llama.cpp flags.
